name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Unzip app
        run: |
          unzip -q OpenClaw_macos.zip -d ./extracted
          # 查找 .app 目录
          APP_PATH=$(find ./extracted -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          mv "$APP_PATH" ./OpenClaw桌面版.app
          rm -rf ./extracted

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dmgbuild
        run: pip install dmgbuild

      - name: Build DMG
        run: |
          dmgbuild \
            -s ./dmg_settings.py \
            "OpenClaw桌面版" \
            OpenClaw桌面版_macos.dmg \
            -D app="./OpenClaw桌面版.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-macos-dmg
          path: OpenClaw桌面版_macos.dmg
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: OpenClaw桌面版 v1.0.${{ github.run_number }}
          files: OpenClaw桌面版_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
