name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract and prepare app
        run: |
          echo "=== ZIP file info ==="
          ls -la OpenClaw_macos.zip
          
          echo ""
          echo "=== Extracting with ditto ==="
          # Create temp directory
          mkdir -p ./temp
          
          # Extract using ditto (handles macOS-specific files)
          ditto -x -k OpenClaw_macos.zip ./temp
          
          echo ""
          echo "=== Extracted contents ==="
          ls -la ./temp/
          
          echo ""
          echo "=== Finding .app ==="
          # Find .app directory (any name)
          APP_PATH=$(find ./temp -name "*.app" -type d -maxdepth 1 2>/dev/null | head -1)
          echo "Found: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            find ./temp -type d -maxdepth 2
            exit 1
          fi
          
          # Get app name
          APP_NAME=$(basename "$APP_PATH")
          echo "App name: $APP_NAME"
          
          # Move to root with simple ASCII name
          mv "$APP_PATH" ./OpenClaw.app
          
          # Cleanup
          rm -rf ./temp
          
          echo ""
          echo "=== Final app ==="
          ls -la ./OpenClaw.app/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dmgbuild
        run: pip install dmgbuild

      - name: Build DMG
        run: |
          dmgbuild \
            -s ./dmg_settings.py \
            "OpenClaw桌面版" \
            OpenClaw桌面版_macos.dmg \
            -D app="./OpenClaw.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-macos-dmg
          path: OpenClaw桌面版_macos.dmg
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: OpenClaw桌面版 v1.0.${{ github.run_number }}
          files: OpenClaw桌面版_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
