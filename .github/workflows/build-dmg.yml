name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Debug - List ZIP contents
        run: |
          echo "=== ZIP file info ==="
          ls -la OpenClaw_macos.zip
          echo ""
          echo "=== ZIP contents ==="
          unzip -l OpenClaw_macos.zip | head -50

      - name: Unzip app
        run: |
          # Create temp directory
          mkdir -p ./extracted
          
          # Unzip with verbose output
          unzip -v OpenClaw_macos.zip -d ./extracted || true
          
          # List extracted contents
          echo "=== Extracted contents ==="
          find ./extracted -type d -maxdepth 3
          
          # Find .app directory
          APP_PATH=$(find ./extracted -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            echo "Listing all files:"
            ls -laR ./extracted | head -100
            exit 1
          fi
          
          # Get app name and move
          APP_NAME=$(basename "$APP_PATH")
          echo "App name: $APP_NAME"
          
          # Copy to root (use cp -R for macOS)
          cp -R "$APP_PATH" "./$APP_NAME"
          
          # Verify
          echo "=== App at root ==="
          ls -la ./
          
          # Cleanup
          rm -rf ./extracted

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dmgbuild
        run: pip install dmgbuild

      - name: Build DMG
        run: |
          # Find app name
          APP_NAME=$(find . -name "*.app" -type d -maxdepth 1 | head -1 | sed 's|^\./||')
          echo "Building DMG for: $APP_NAME"
          
          if [ -z "$APP_NAME" ]; then
            echo "ERROR: No .app found at root"
            ls -la ./
            exit 1
          fi
          
          dmgbuild \
            -s ./dmg_settings.py \
            "OpenClaw桌面版" \
            OpenClaw桌面版_macos.dmg \
            -D app="./$APP_NAME"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-macos-dmg
          path: OpenClaw桌面版_macos.dmg
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: OpenClaw桌面版 v1.0.${{ github.run_number }}
          files: OpenClaw桌面版_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
