name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Unzip app
        run: |
          # List ZIP contents
          unzip -l OpenClaw_macos.zip
          
          # Unzip
          unzip -q OpenClaw_macos.zip -d ./extracted
          
          # Find and move .app (handle Chinese characters)
          APP_PATH=$(find ./extracted -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in ZIP"
            ls -la ./extracted/
            exit 1
          fi
          
          # Get app name
          APP_NAME=$(basename "$APP_PATH")
          echo "App name: $APP_NAME"
          
          # Move to root
          mv "$APP_PATH" "./$APP_NAME"
          rm -rf ./extracted
          
          # Verify
          ls -la ./

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dmgbuild
        run: pip install dmgbuild

      - name: Build DMG
        run: |
          # Find app name
          APP_NAME=$(find . -name "*.app" -type d -maxdepth 1 | head -1 | sed 's|^\./||')
          echo "Building DMG for: $APP_NAME"
          
          dmgbuild \
            -s ./dmg_settings.py \
            "OpenClaw桌面版" \
            OpenClaw桌面版_macos.dmg \
            -D app="./$APP_NAME"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-macos-dmg
          path: OpenClaw桌面版_macos.dmg
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: OpenClaw桌面版 v1.0.${{ github.run_number }}
          files: OpenClaw桌面版_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
