name: Build DMG from Chunks

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release ID with chunks'
        required: true
        default: '304016090'

jobs:
  build-dmg:
    runs-on: macos-latest
    
    steps:
      - name: Download chunks
        run: |
          RELEASE_ID=${{ github.event.inputs.release_id }}
          for i in $(seq -f "%02g" 1 12); do
            echo "Downloading part${i}..."
            curl -L -o "part$i" \
              "https://github.com/yunyiwanglu/openclaw-mac-build/releases/download/v1.0.0-test/OpenClaw_macos_fixed.zip.part$i"
          done
      
      - name: Reassemble zip
        run: |
          cat part* > OpenClaw_macos_fixed.zip
          echo "Reassembled size: $(du -sh OpenClaw_macos_fixed.zip)"
          rm part*
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Extract and prepare app
        run: |
          python3 << 'PYEOF'
          import zipfile
          import os
          import shutil
          import stat

          zip_path = "OpenClaw_macos_fixed.zip"
          extract_dir = "./temp"
          app_dest = "./OpenClaw.app"

          # Remove existing temp and app
          if os.path.exists(extract_dir):
              shutil.rmtree(extract_dir)
          if os.path.exists(app_dest):
              shutil.rmtree(app_dest)

          print(f"Opening {zip_path}...")
          with zipfile.ZipFile(zip_path, 'r') as zf:
              # First list what names are in the zip
              names = zf.namelist()
              print(f"Total entries: {len(names)}")
              for n in names[:10]:
                  print(f"  {n}")
              if len(names) > 10:
                  print(f"  ... and {len(names)-10} more")
              
              # Find the .app directory path
              app_path_in_zip = None
              for name in names:
                  if name.endswith('.app/') or '.app\\' in name.replace('\\', '/'):
                      # Get the root .app directory
                      parts = name.replace('\\', '/').split('/')
                      for i, part in enumerate(parts):
                          if part.endswith('.app'):
                              app_path_in_zip = '/'.join(parts[:i+1])
                              break
                      if app_path_in_zip:
                          break
              
              if not app_path_in_zip:
                  print("ERROR: .app not found in zip!")
                  # Try to find any directory ending in .app
                  for name in names:
                      if '.app' in name.lower():
                          print(f"  Possible: {name}")
                  raise Exception(".app not found")
              
              print(f"Extracting .app from: {app_path_in_zip}")
              
              # Extract all files from .app path
              for name in names:
                  if not name.startswith(app_path_in_zip):
                      continue
                  # Strip the app path prefix to get relative path
                  relative_name = name[len(app_path_in_zip):]
                  if not relative_name:
                      continue
                  
                  target = os.path.join(extract_dir, relative_name)
                  
                  # Create directory if needed
                  parent_dir = os.path.dirname(target)
                  if parent_dir and not os.path.exists(parent_dir):
                      os.makedirs(parent_dir, exist_ok=True)
                  
                  # Extract file
                  if name.endswith('/'):
                      # Directory
                      os.makedirs(target, exist_ok=True)
                  else:
                      # File - write with binary mode
                      try:
                          data = zf.read(name)
                          with open(target, 'wb') as f:
                              f.write(data)
                      except Exception as e:
                          print(f"  Warning: failed to extract {name}: {e}")
                          continue
          
          print(f"\n=== Extracted contents ===")
          for root, dirs, files in os.walk(extract_dir):
              level = root.replace(extract_dir, '').count(os.sep)
              if level < 2:
                  print(f"  {os.path.basename(root)}/")
          
          # Find .app in temp
          app_in_temp = None
          for item in os.listdir(extract_dir):
              if item.endswith('.app'):
                  app_in_temp = os.path.join(extract_dir, item)
                  break
          
          if not app_in_temp:
              print("ERROR: .app not found after extraction!")
              raise Exception(".app not found")
          
          print(f"\nMoving {app_in_temp} to {app_dest}")
          shutil.move(app_in_temp, app_dest)
          shutil.rmtree(extract_dir)
          
          print(f"\n=== Final app contents ===")
          for item in os.listdir(app_dest):
              print(f"  {item}")
          
          print("\nDone!")
          PYEOF
      
      - name: Fix Info.plist
        run: |
          PLIST="./OpenClaw.app/Contents/Info.plist"
          
          # Remove LSRequiresCarbon
          /usr/libexec/PlistBuddy -c "Delete :LSRequiresCarbon" "$PLIST" 2>/dev/null || true
          
          # Add NSPrincipalClass if missing
          HAS_PRINCIPAL=$(/usr/libexec/PlistBuddy -c "Print :NSPrincipalClass" "$PLIST" 2>/dev/null && echo "yes" || echo "no")
          if [ "$HAS_PRINCIPAL" = "no" ]; then
            /usr/libexec/PlistBuddy -c "Add :NSPrincipalClass string NSApplication" "$PLIST"
          fi
          
          echo "=== Fixed Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :LSRequiresCarbon" "$PLIST" 2>/dev/null && echo "LSRequiresCarbon: STILL PRESENT (bad)" || echo "LSRequiresCarbon: removed (good)"
          /usr/libexec/PlistBuddy -c "Print :NSPrincipalClass" "$PLIST"
      
      - name: Install dmgbuild
        run: pip install dmgbuild

      - name: Build DMG
        run: |
          dmbuild \
            -s ./dmg_settings.py \
            "OpenClaw中文" \
            OpenClaw中文_macos.dmg \
            -D app="./OpenClaw.app"
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-macos-dmg
          path: OpenClaw中文_macos.dmg
          retention-days: 30
      
      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.fixed-${{ github.run_number }}
          name: OpenClaw macOS Fixed Build v1.0.${{ github.run_number }}
          files: OpenClaw中文_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
